name: Build packages only for UZ801 OpenWrt

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      TZ: Europe/Moscow

    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine build number
        id: buildnum
        shell: bash
        run: |
          git fetch --tags || true
          TAG_PREFIX="packages-"
          LAST_NUM=$(git tag -l "${TAG_PREFIX}*" | sed "s/${TAG_PREFIX}//" | sort -n | tail -1)

          if [ -z "$LAST_NUM" ]; then
            BUILD_NUM=1
          else
            BUILD_NUM=$((LAST_NUM + 1))
          fi

          echo "BUILD_NUM=$BUILD_NUM" >> "$GITHUB_OUTPUT"
          echo "Next Build number: $BUILD_NUM"

      - name: Install build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo -E apt-get update -qq
          sudo -E apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig \
            unzip zlib1g-dev file wget python3-cryptography mkbootimg qemu-utils \
            asciidoc help2man xsltproc bc binutils bzip2 make patch time \
            device-tree-compiler e2fsprogs fdisk util-linux perl perl-modules python3-dev \
            xz-utils zstd zip libelf-dev libfdt-dev

      - name: Determine OpenWrt version
        id: openwrt_version
        run: |
          VERSION=$(git ls-remote --tags https://git.openwrt.org/openwrt/openwrt.git 'v25.12.*' \
            | grep -oP 'v25\.12\.\d+$' | sort -V | tail -1)
          if [ -z "$VERSION" ]; then
            echo "Failed to fetch the latest OpenWrt version." && exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "OpenWrt version: $VERSION"

      - name: Clone OpenWrt
        run: |
          git clone --depth 1 --branch "${{ steps.openwrt_version.outputs.VERSION }}" \
            https://git.openwrt.org/openwrt/openwrt.git openwrt

      - name: Apply patches and copy platform files
        run: |
          chmod +x apply_patches.sh
          ./apply_patches.sh openwrt
          mkdir -p openwrt/target/linux/msm89xx openwrt/package/msm8916
          cp -a msm89xx/* openwrt/target/linux/msm89xx/
          cp -a packages/* openwrt/package/msm8916/

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply configuration
        working-directory: openwrt
        run: |
          cp ../diffconfig_uz801 .config
          make defconfig

      - name: Cache downloaded sources
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: openwrt-dl-${{ steps.openwrt_version.outputs.VERSION }}-${{ hashFiles('diffconfig_uz801') }}
          restore-keys: |
            openwrt-dl-${{ steps.openwrt_version.outputs.VERSION }}-
            openwrt-dl-

      - name: Download sources
        working-directory: openwrt
        run: make download -j$(nproc)

      - name: Build tools and toolchain
        working-directory: openwrt
        run: |
          make tools/install -j$(nproc) || make tools/install -j1 V=s
          make toolchain/install -j$(nproc) || make toolchain/install -j1 V=s

      - name: Compile kernel (required for kmod packages)
        working-directory: openwrt
        run: make target/linux/compile -j$(nproc) || make target/linux/compile -j1 V=s

      - name: Build custom packages
        working-directory: openwrt
        run: |
          for pkg_dir in ../packages/*/; do
            pkg_name=$(basename "$pkg_dir")
            echo "-> Building $pkg_name..."
            make "package/msm8916/$pkg_name/compile" -j$(nproc) \
              || make "package/msm8916/$pkg_name/compile" -j1 V=s
          done

      - name: Collect .apk artifacts
        run: |
          mkdir -p release_files
          find openwrt/bin/packages -name "*.apk" -exec cp {} release_files/ \;
          echo "Collected packages:"
          ls -lh release_files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "packages-${{ steps.buildnum.outputs.BUILD_NUM }}"
          name: "Custom Packages for UZ801 Build ${{ steps.buildnum.outputs.BUILD_NUM }}"
          files: release_files/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
